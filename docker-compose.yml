services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mlserve
      POSTGRES_PASSWORD: mlserve
      POSTGRES_DB: mlserve
    ports:
      - "5432:5432"
    volumes:
      - "pgdata:/var/lib/postgresql/data"
  
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+asyncpg://mlserve:mlserve@db:5432/mlserve

volumes:
  pgdata: