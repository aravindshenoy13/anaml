services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mlserve
      POSTGRES_PASSWORD: mlserve
      POSTGRES_DB: mlserve
    ports:
      - "5432:5432"
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U mlserve"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mlserve:mlserve@db:5432/mlserve
      REDIS_URL: redis://cache:6379

volumes:
  pgdata: